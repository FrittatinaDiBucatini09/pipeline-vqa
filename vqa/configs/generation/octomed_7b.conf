# ==============================================================================
# CONFIGURATION FOR OCTOMED 7B
# ==============================================================================
# Model card: https://huggingface.co/OctoMed/OctoMed-7B
# Based on Qwen2.5-VL — uses <think>...</think> reasoning and \boxed{} output.

# MODEL CONFIGURATION
# ------------------------------------------------------------------------------
MODEL_NAME="OctoMed/OctoMed-7B"
TRUST_REMOTE_CODE=true

# INFERENCE PARAMETERS (aligned with model card)
# ------------------------------------------------------------------------------
BATCH_SIZE=4                             # Reduced for 7B model on 24GB VRAM
MAX_TOKENS=4096                          # High: model uses reasoning/thinking tokens
TEMPERATURE=0.6                          # Model card recommendation
TOP_P=0.95                               # Model card recommendation
GPU_MEMORY_UTILIZATION=0.95              # Maximize for 7B model

# MULTIMODAL VISION SETTINGS (model card recommendation)
# ------------------------------------------------------------------------------
MIN_PIXELS=262144                        # 512x512
MAX_PIXELS=262144                        # 512x512

# PROMPTING STRATEGY
# ------------------------------------------------------------------------------
USE_COT=false                            # OctoMed has built-in reasoning via <think>
ENABLE_THINKING=true                     # Enable thinking mode for the model
USE_FEW_SHOT=true
NUM_FEW_SHOT=3

# MULTIMODAL SETTINGS
# ------------------------------------------------------------------------------
USE_IMAGES=true

# CHECKPOINTING
# ------------------------------------------------------------------------------
CHECKPOINT_INTERVAL=50                   # Save every 50 samples to prevent data loss

# OUTPUT CONTROL
# ------------------------------------------------------------------------------
SAVE_GENERATIONS=true
